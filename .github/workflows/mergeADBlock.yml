name: Merge ADBlock List

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

env:
  FILENAME: "Adblock"
  DESCRIPTION: "# 去广告规则分流规则合并流程"
  DIVERSION_RULES_LIST_URLS: |
    https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Privacy/Privacy.list
    https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/AdvertisingMiTV/AdvertisingMiTV.list
    https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/ZhihuAds/ZhihuAds.list
    https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/AdvertisingLite/AdvertisingLite.list
  ILLUSTRATE: "# 分流规则基于ios_rule_script大佬的规则合并而来，感谢大佬和其他贡献者的无私奉献"
  RULES_SOURCE: "# 基于以下分流规则合并："
  AUTHOR: "# 作者：Reid_Vin_Action"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download and process diversion rules
        run: |
          python3 Scripts/merge_clash_rules.py \
            --sources-env DIVERSION_RULES_LIST_URLS \
            --output "./Clash/Ruleset/$FILENAME.list" \
            --title "$ILLUSTRATE" \
            --description "$DESCRIPTION" \
            --author "$AUTHOR" \
            --analysis-dir "./analysis" \
            --fail-on-empty

          echo "合并完成》》》"
      - name: Push changes
        uses: EndBug/add-and-commit@v9.1.4
        with:
          author_name: Reid_Vin
          author_email: reid_vin@outlook.com
          message: Automatic diversion rules update
          add: |
            ./Clash/Ruleset/${{ env.FILENAME }}.list
            Scripts/merge_clash_rules.py
        env:
          GITHUB_TOKEN: ${{ secrets.COMMON_TOKEN }}
